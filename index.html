<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Évaluation CFML</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
  }

  /* BARRE ULTRA COMPACTE */
  #nav {
    width: 100%;
    padding: 5px 10px; /* réduit */
    background: #003366;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .left, .center, .right {
    flex: 1;
    display: flex;
    align-items: center;
  }

  .left {
    justify-content: flex-start;
    font-size: 13px; /* plus petit */
    color: white;
  }

  .center {
    justify-content: center;
    gap: 10px;
  }

  .right {
    justify-content: flex-end;
    font-size: 13px;
    color: white;
  }

  button {
    font-size: 13px;       /* réduit */
    padding: 6px 12px;     /* réduit */
    cursor: pointer;
  }

  /* MAXIMISER L’ESPACE EXAMEN */
  iframe {
    width: 100%;
    height: 94vh; /* plus grand */
    border: none;
  }
</style>
</head>

<body>

<div id="nav">

  <div class="left">
    <div id="battery">🔋 --%</div>
  </div>

  <div class="center">
    <button onclick="showSite('https://evaluation.e-potentiel.com/demo/pro/fr')">CFML</button>
    <button onclick="showSite('https://docs.google.com/forms/d/e/1FAIpQLSf2yFznBDSG751_oohrLzW-Yvze3A8W_um0z74SKvP3PmKtrA/viewform?embedded=true')">Formulaire</button>
  </div>

  <div class="right">
    <div id="clock">--:--</div>
  </div>

</div>

<!-- Google Form par défaut -->
<iframe id="examFrame" src="https://docs.google.com/forms/d/e/1FAIpQLSf2yFznBDSG751_oohrLzW-Yvze3A8W_um0z74SKvP3PmKtrA/viewform?embedded=true"></iframe>

<script>
function showSite(url) {
  document.getElementById('examFrame').src = url;
}

// Horloge compacte
function updateClock() {
  const now = new Date();
  document.getElementById('clock').innerText =
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// Batterie compacte + couleur
if (navigator.getBattery) {
  navigator.getBattery().then(battery => {

    function updateBattery() {
      let level = Math.round(battery.level * 100);
      let el = document.getElementById('battery');

      el.innerText = "🔋 " + level + "%";

      if (level >= 50) el.style.color = "lightgreen";
      else if (level >= 20) el.style.color = "orange";
      else el.style.color = "red";
    }

    battery.addEventListener('levelchange', updateBattery);
    updateBattery();

  });
}
</script>

</body>
</html>
