<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Évaluation du Centre de Formation en Montage de Lignes (CFML)</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
  }

  header {
    display: flex;
    align-items: center;
    background: #003366;
    color: white;
    padding: 10px 20px;
  }

  header img {
    height: 60px;
  }

  header h1 {
    flex: 1;
    text-align: center;
    font-size: 1.5em;
    margin: 0;
  }

  #nav {
    width: 95%;
    margin: 15px auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .left, .center, .right {
    flex: 1;
    display: flex;
    align-items: center;
  }

  .left {
    justify-content: flex-start;
    font-weight: bold;
  }

  .center {
    justify-content: center;
    gap: 15px;
  }

  .right {
    justify-content: flex-end;
    font-weight: bold;
  }

  button {
    font-size: 16px;
    padding: 10px 20px;
    cursor: pointer;
  }

  iframe {
    width: 98%;
    height: 80vh;
    margin: auto;
    display: block;
    border: none;
  }
</style>
</head>

<body>

<header>
  <img src="https://cssdn.gouv.qc.ca/wp-content/themes/CSN12282-cssdn.gouv.qc.ca/assets/img/logo-cssdn.svg">
  <h1>Évaluation du Centre de Formation en Montage de Lignes</h1>
</header>

<div id="nav">

  <div class="left">
    <div id="battery">Batterie 🔋 : --%</div>
  </div>

  <div class="center">
    <button onclick="showSite('https://testcfpml.cssdn.gouv.qc.ca')">Évaluation CFML</button>
    <button onclick="showSite('https://docs.google.com/forms/d/e/1FAIpQLSf2yFznBDSG751_oohrLzW-Yvze3A8W_um0z74SKvP3PmKtrA/viewform?embedded=true')">Formulaire Google</button>
  </div>

  <div class="right">
    <div id="clock">--:--:--</div>
  </div>

</div>

<!-- ✅ GOOGLE FORM PAR DÉFAUT -->
<iframe id="examFrame" src="https://docs.google.com/forms/d/e/1FAIpQLSf2yFznBDSG751_oohrLzW-Yvze3A8W_um0z74SKvP3PmKtrA/viewform?embedded=true"></iframe>

<script>
function showSite(url) {
  document.getElementById('examFrame').src = url;
}

// Horloge
function updateClock() {
  const now = new Date();
  document.getElementById('clock').innerText = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// Batterie
if (navigator.getBattery) {
  navigator.getBattery().then(battery => {

    function updateBattery() {
      let level = Math.round(battery.level * 100);
      let batteryText = document.getElementById('battery');

      batteryText.innerText = "Batterie 🔋 : " + level + "%";

      if (level >= 50) {
        batteryText.style.color = "green";
      } else if (level >= 20) {
        batteryText.style.color = "orange";
      } else {
        batteryText.style.color = "red";
      }
    }

    battery.addEventListener('levelchange', updateBattery);
    updateBattery();

  });
}
</script>

</body>
</html>
