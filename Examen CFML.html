<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Examen CFML</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: #f5f5f5;
    text-align: center;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #003366;
    color: white;
    padding: 10px;
  }

  header img {
    height: 100px; /* taille du logo */
    margin-right: 20px;
  }

  h1 {
    font-size: 2.2em;
    font-weight: bold;
  }

  #nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px; /* espace entre boutons et info */
    flex-wrap: wrap; /* permet de s'adapter si écran petit */
    margin: 20px;
  }

  button {
    font-size: 20px;
    padding: 15px 30px;
    cursor: pointer;
  }

  #clock, #battery {
    font-weight: bold;
    font-size: 16px;
    color: #003366;
  }

  iframe {
    width: 100%;
    height: 70vh;
    border: none;
  }

  footer {
    display: none; /* on cache le footer pour éviter conflit avec Tiiny */
  }
</style>
</head>
<body>

<header>
  <img src="https://cssdn.gouv.qc.ca/wp-content/themes/CSN12282-cssdn.gouv.qc.ca/assets/img/logo-cssdn.svg" alt="Logo CFML">
  <h1>Examen CFML</h1>
</header>

<div id="nav">
  <button onclick="showSite('https://app.formative.com')">Formative</button>
  <button onclick="showSite('https://docs.google.com/forms/d/e/1FAIpQLSclc-sc048ybbydeNsw5UspU0ReQAhkTeaQ2lEWF4PiUWhsPQ/viewform?usp=publish-editor')">Formulaire Google</button>
  <div id="clock">--:--:--</div>
  <div id="battery">🔋 Batterie: --%</div>
</div>

<iframe id="examFrame" src="https://app.formative.com"></iframe>

<script>
function showSite(url) {
  document.getElementById('examFrame').src = url;
}

// Horloge live
function updateClock() {
  const now = new Date();
  document.getElementById('clock').innerText = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// Batterie
if (navigator.getBattery) {
  navigator.getBattery().then(battery => {
    function updateBattery() {
      document.getElementById('battery').innerText = "🔋 Batterie: " + Math.round(battery.level*100) + "%";
    }
    battery.addEventListener('levelchange', updateBattery);
    updateBattery();
  });
}
</script>

</body>
</html>
